apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-agent
  namespace: ai-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-agent-job-creator
  namespace: ai-dev
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-agent-job-creator
  namespace: ai-dev
subjects:
  - kind: ServiceAccount
    name: ai-agent
    namespace: ai-dev
roleRef:
  kind: Role
  name: ai-agent-job-creator
  apiGroup: rbac.authorization.k8s.io
