# GitHub full pipeline job.
# Usage: substitute ISSUE_ID before applying.
#   ISSUE_ID=42 envsubst < k8s/gh-pipeline-job.yaml | kubectl apply -f -
apiVersion: batch/v1
kind: Job
metadata:
  name: ai-gh-implement-${ISSUE_ID}
  namespace: ai-dev
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 7200   # 2 hours max
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: ai-workspace
        - name: secrets
          secret:
            secretName: ai-dev-secrets
            items:
              - key: ssh-key
                path: ssh-key
                mode: 0600
        - name: claude-settings
          secret:
            secretName: claude-settings   # kubectl create secret generic claude-settings --from-file=settings.json=$HOME/.claude/settings.json -n ai-dev
      # Common env/volume config referenced by each container
      # Steps run sequentially as init containers; poll_pr is the main container.
      initContainers:
        - name: plan
          image: ghcr.io/bhatti/ai-dev-tools:latest
          imagePullPolicy: Always
          command: ["python", "-m", "scripts.gh.plan", "--issue-id", "${ISSUE_ID}"]
          envFrom:
            - secretRef:
                name: ai-dev-secrets
          env: &common-env
            - name: GH_ORG
              value: "bhatti"
            - name: GH_REPO
              value: "your-repo"
            - name: WORKSPACE_DIR
              value: "/workspace"
            - name: AI_MODEL
              value: "claude-sonnet-4-6"
          volumeMounts: &common-mounts
            - name: workspace
              mountPath: /workspace
            - name: secrets
              mountPath: /secrets
              readOnly: true
            - name: claude-settings
              mountPath: /home/agent/.claude
              readOnly: true
          resources: &common-resources
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi

        - name: implement
          image: ghcr.io/bhatti/ai-dev-tools:latest
          imagePullPolicy: Always
          command: ["python", "-m", "scripts.gh.implement", "--issue-id", "${ISSUE_ID}"]
          envFrom:
            - secretRef:
                name: ai-dev-secrets
          env: *common-env
          volumeMounts: *common-mounts
          resources: *common-resources

        - name: create-pr
          image: ghcr.io/bhatti/ai-dev-tools:latest
          imagePullPolicy: Always
          command: ["python", "-m", "scripts.gh.create_pr", "--issue-id", "${ISSUE_ID}"]
          envFrom:
            - secretRef:
                name: ai-dev-secrets
          env: *common-env
          volumeMounts: *common-mounts
          resources: *common-resources

      containers:
        - name: poll-pr
          image: ghcr.io/bhatti/ai-dev-tools:latest
          imagePullPolicy: Always
          command: ["python", "-m", "scripts.gh.poll_pr", "--issue-id", "${ISSUE_ID}"]
          envFrom:
            - secretRef:
                name: ai-dev-secrets
          env:
            - name: GH_ORG
              value: "bhatti"
            - name: GH_REPO
              value: "your-repo"
            - name: WORKSPACE_DIR
              value: "/workspace"
            - name: AI_MODEL
              value: "claude-sonnet-4-6"
            - name: POLL_INTERVAL
              value: "120"
          volumeMounts: *common-mounts
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
