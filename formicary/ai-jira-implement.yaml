# Formicary job: full Jira/BitBucket SDLC pipeline for one issue.
# Runs plan → implement → create_pr as sequential tasks.
# poll_pr (which calls learn on completion) runs as the final long-running task.
#
# Usage:
#   formicary submit formicary/ai-jira-implement.yaml --var ISSUE_ID=PROJ-42

job-type: ai-jira-implement
description: "AI-driven implementation pipeline for a Jira issue"
timeout: 7200s

variables:
  ISSUE_ID:
    type: STRING
    required: true

tasks:
  - task-type: plan
    method: DOCKER
    image: ${IMAGE_REPO}/ai-dev-tools:${IMAGE_TAG:-latest}
    working-dir: /app
    environment:
      WORKSPACE_DIR: /workspace
      JIRA_BASE_URL: ${JIRA_BASE_URL}
      JIRA_EMAIL: ${JIRA_EMAIL}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      JIRA_PROJECT: ${JIRA_PROJECT}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-6}
      MAX_TURNS_PLAN: ${MAX_TURNS_PLAN:-50}
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK:-0}
      ANTHROPIC_BEDROCK_BASE_URL: ${ANTHROPIC_BEDROCK_BASE_URL:-http://ai/bedrock}
      CLAUDE_CODE_SKIP_BEDROCK_AUTH: ${CLAUDE_CODE_SKIP_BEDROCK_AUTH:-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    script:
      - python -m scripts.jira.plan --issue-id ${ISSUE_ID}
    artifacts:
      paths:
        - /workspace/${ISSUE_ID}
      expire-after: 24h
    on-exit-code:
      0: COMPLETED
      2: PAUSED
      ELSE: FAILED

  - task-type: implement
    method: DOCKER
    image: ${IMAGE_REPO}/ai-dev-tools:${IMAGE_TAG:-latest}
    working-dir: /app
    depends-on:
      - plan
    artifact_ids:
      - plan
    environment:
      WORKSPACE_DIR: /workspace
      JIRA_BASE_URL: ${JIRA_BASE_URL}
      JIRA_EMAIL: ${JIRA_EMAIL}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      BITBUCKET_WORKSPACE: ${BITBUCKET_WORKSPACE}
      BITBUCKET_REPO: ${BITBUCKET_REPO}
      BITBUCKET_USERNAME: ${BITBUCKET_USERNAME}
      BITBUCKET_TOKEN: ${BITBUCKET_TOKEN}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-6}
      MAX_TURNS_IMPLEMENT: ${MAX_TURNS_IMPLEMENT:-100}
      GIT_USER_NAME: ${GIT_USER_NAME:-AI Agent}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-ai-agent@noreply.local}
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK:-0}
      ANTHROPIC_BEDROCK_BASE_URL: ${ANTHROPIC_BEDROCK_BASE_URL:-http://ai/bedrock}
      CLAUDE_CODE_SKIP_BEDROCK_AUTH: ${CLAUDE_CODE_SKIP_BEDROCK_AUTH:-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    script:
      - python -m scripts.jira.implement --issue-id ${ISSUE_ID}
    artifacts:
      paths:
        - /workspace/${ISSUE_ID}
      expire-after: 24h
    on-exit-code:
      0: COMPLETED
      ELSE: FAILED

  - task-type: create-pr
    method: DOCKER
    image: ${IMAGE_REPO}/ai-dev-tools:${IMAGE_TAG:-latest}
    working-dir: /app
    depends-on:
      - implement
    artifact_ids:
      - plan
      - implement
    environment:
      WORKSPACE_DIR: /workspace
      JIRA_BASE_URL: ${JIRA_BASE_URL}
      JIRA_EMAIL: ${JIRA_EMAIL}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      BITBUCKET_WORKSPACE: ${BITBUCKET_WORKSPACE}
      BITBUCKET_REPO: ${BITBUCKET_REPO}
      BITBUCKET_USERNAME: ${BITBUCKET_USERNAME}
      BITBUCKET_TOKEN: ${BITBUCKET_TOKEN}
      INPROGRESS_LABEL: ${INPROGRESS_LABEL:-ai-in-progress}
      PR_OPEN_LABEL: ${PR_OPEN_LABEL:-ai-pr-open}
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK:-0}
      ANTHROPIC_BEDROCK_BASE_URL: ${ANTHROPIC_BEDROCK_BASE_URL:-http://ai/bedrock}
      CLAUDE_CODE_SKIP_BEDROCK_AUTH: ${CLAUDE_CODE_SKIP_BEDROCK_AUTH:-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    script:
      - python -m scripts.jira.create_pr --issue-id ${ISSUE_ID}
    artifacts:
      paths:
        - /workspace/${ISSUE_ID}
      expire-after: 24h
    on-exit-code:
      0: COMPLETED
      ELSE: FAILED

  - task-type: poll-pr
    method: DOCKER
    image: ${IMAGE_REPO}/ai-dev-tools:${IMAGE_TAG:-latest}
    working-dir: /app
    depends-on:
      - create-pr
    artifact_ids:
      - plan
      - implement
      - create-pr
    # No task-level timeout — runs once per formicary retry cycle.
    environment:
      WORKSPACE_DIR: /workspace
      JIRA_BASE_URL: ${JIRA_BASE_URL}
      JIRA_EMAIL: ${JIRA_EMAIL}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      BITBUCKET_WORKSPACE: ${BITBUCKET_WORKSPACE}
      BITBUCKET_REPO: ${BITBUCKET_REPO}
      BITBUCKET_USERNAME: ${BITBUCKET_USERNAME}
      BITBUCKET_TOKEN: ${BITBUCKET_TOKEN}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-6}
      NEEDS_HUMAN_LABEL: ${NEEDS_HUMAN_LABEL:-needs-human}
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK:-0}
      ANTHROPIC_BEDROCK_BASE_URL: ${ANTHROPIC_BEDROCK_BASE_URL:-http://ai/bedrock}
      CLAUDE_CODE_SKIP_BEDROCK_AUTH: ${CLAUDE_CODE_SKIP_BEDROCK_AUTH:-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    script:
      # Runs once: exits 0 (merged/declined), 3 (still open → PAUSED), or 1 (error).
      # learn.py is called automatically inside poll_pr on exit 0.
      - python -m scripts.jira.poll_pr --issue-id ${ISSUE_ID}
    artifacts:
      paths:
        - /workspace/${ISSUE_ID}
      expire-after: 168h
    on-exit-code:
      0: COMPLETED           # PR merged or declined — pipeline done
      3: PAUSED              # PR still open — formicary retries after delay
      ELSE: FAILED
    delay: ${POLL_INTERVAL:-120}s   # seconds to wait before retrying a PAUSED task
